<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta content="text/html; charset=UTF-8" http-equiv="Content-Type" />
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Haxademic.js Demo</title>
    <link rel="stylesheet" href="../css/pico.css" />
    <link rel="stylesheet" href="../css/haxademic.css" />
    <link rel="stylesheet" href="../css/lazy-image-loader.css" />
    <link rel="stylesheet" href="../css/lightbox.css" />
    <link rel="stylesheet" href="../css/site.css" />
    <script src="../src/console.js"></script>
  </head>
  <body>
    <!--
      Shell layout for new-style web component demos.
      Shown only after a new-style demo loads (hidden for legacy demos).
      Legacy demos (demo-*.js) build their own layout and append to <body>.
    -->
    <main class="container demo" id="demo-shell" hidden>
      <a id="demo-back-btn" href="../" role="button">← All Demos</a>
      <a id="demo-src-btn" href="#" target="_blank" role="button" style="float: right">Demo source</a>
      <h1 id="demo-title"></h1>
      <p id="demo-desc" hidden></p>
      <div id="demo-host" class="demo-el"></div>
      <p id="demo-debug" class="demo-debug"></p>
    </main>

    <script type="module">
      import ErrorUtil from "../src/error-util.js";

      window.addEventListener("hashchange", () => location.reload());

      const hash = document.location.hash.replace("%26", "&");
      const parts = hash.substring(1).split("&");
      const demoId = parts[0];
      const isBare = parts.includes("bare");

      if (!demoId || demoId.length < 2) {
        document.location.href = "../";
      } else {
        ErrorUtil.initErrorCatching();

        if (isBare) {
          document.body.style.cssText = "margin:0;padding:0;overflow:hidden";
        }

        // import.meta.glob is a Vite-only API; fall back to a plain dynamic
        // import when running outside Vite (e.g. a static file server).
        const newStyleDemos = import.meta.glob ? import.meta.glob("./*.js") : null;

        try {
          // New-style: hash = element name = filename (no demo- prefix).
          // Dynamic import registers the custom element, then we create it.
          const loader = newStyleDemos?.[`./${demoId}.js`] ?? (() => import(`./${demoId}.js`));
          if (!loader) throw new Error(`No demo file found: ${demoId}.js`);
          await loader();

          const DemoClass = customElements.get(demoId);
          const meta = DemoClass?.meta || {};

          if (!isBare) {
            if (meta.title) document.title = `Haxademic.js | ${meta.title}`;
            document.getElementById("demo-title").textContent = meta.title || demoId;
            document.getElementById("demo-src-btn").href =
              `https://github.com/cacheflowe/haxademic.js/blob/master/demo/${demoId}.js`;

            const descEl = document.getElementById("demo-desc");
            if (meta.description) {
              descEl.textContent = meta.description;
              descEl.hidden = false;
            }

            document.getElementById("demo-shell").hidden = false;
            document.getElementById("demo-host").appendChild(document.createElement(demoId));
          } else {
            document.body.appendChild(document.createElement(demoId));
          }
        } catch (e) {
          // Legacy fallback: demo-${demoId}.js sets window.autoInitDemo and self-appends.
          if (!isBare) {
            document.getElementById("demo-src-btn").href =
              `https://github.com/cacheflowe/haxademic.js/blob/master/demo/demo-${demoId}.js`;
          }
          window.autoInitDemo = true;
          await import(`./demo-${demoId}.js`);
        }
      }
    </script>
  </body>
</html>
